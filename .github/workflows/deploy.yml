name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: cd pcf-validator && npm ci
      - name: Build project
        run: cd pcf-validator && npm run build
      - name: Deploy
        run: echo "Deployment script or action goes here (e.g. GitHub Pages or Vercel)"
